name: ImageStudio
options:
  bundleIdPrefix: com.nightvibes
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: targeted
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
configs:
  Debug: debug
  Release: release
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
targets:
  ImageStudio:
    type: application
    platform: iOS
    sources:
      - path: Sources/ImageStudio
      - path: Sources/PuterImageStudio/DesignSystem
    dependencies:
      - package: ZIPFoundation
        product: ZIPFoundation
    info:
      path: Sources/ImageStudio/App/Info.plist
      properties:
        CFBundleDisplayName: Image Studio
        CFBundleURLTypes:
          - CFBundleURLName: com.nightvibes.imagestudio
            CFBundleURLSchemes:
              - imagestudio
        NSPhotoLibraryAddUsageDescription: Image Studio saves generated artwork only when you tap Save.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nightvibes.imagestudio
        PRODUCT_NAME: Image Studio
        INFOPLIST_FILE: Sources/ImageStudio/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
