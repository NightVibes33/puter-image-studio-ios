name: iOS unsigned IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        type: boolean
        required: true
        default: false

jobs:
  build:
    name: Build unsigned iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          # Pick highest-versioned Xcode available on the runner
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned IPA
        id: build_ipa
        run: bash Scripts/package_unsigned_ipa.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageStudio-iOS-unsigned
          path: build/ImageStudio-unsigned.ipa
