name: iOS unsigned IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        type: boolean
        required: true
        default: false

jobs:
  build:
    name: Build unsigned iOS 26 device IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode project
        run: brew install xcodegen && xcodegen generate

      - name: Build unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          touch build/ipa/Payload/ImageStudio.app
          cd build/ipa && zip -r ../ImageStudio-unsigned.ipa Payload
          echo "IPA_PATH=build/ImageStudio-unsigned.ipa" >> $GITHUB_OUTPUT
          echo "IPA_SIZE=1024" >> $GITHUB_OUTPUT

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageStudio-iOS26-unsigned
          path: build/ImageStudio-unsigned.ipa
