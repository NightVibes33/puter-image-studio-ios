name: iOS unsigned IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        type: boolean
        required: true
        default: false

jobs:
  build:
    name: Build unsigned iOS 26 device IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (26 preferred, latest fallback)
        run: |
          # Try Xcode 26 beta/release first, fall back to latest available
          if ls /Applications/Xcode_26*.app 2>/dev/null | head -1 | grep -q Xcode; then
            XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
            sudo xcode-select -s "$XCODE/Contents/Developer"
          elif ls /Applications/Xcode_16*.app 2>/dev/null | head -1 | grep -q Xcode; then
            XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
            sudo xcode-select -s "$XCODE/Contents/Developer"
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          xcodebuild -showsdks

      - name: Lower deployment target if iOS 26 SDK unavailable
        run: |
          SDK=$(xcodebuild -showsdks 2>/dev/null | grep iphoneos | tail -1 | grep -oE 'iphoneos[0-9.]+' | grep -oE '[0-9.]+')
          echo "Available iOS SDK: $SDK"
          # If SDK < 26, patch project.yml to use available SDK
          if [ "$(echo "$SDK < 26" | bc)" = "1" ]; then
            echo "iOS 26 SDK not available, patching project.yml to iOS $SDK"
            sed -i '' "s/iOS: \"26.0\"/iOS: \"$SDK\"/" project.yml
            sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET: \"26.0\"/IPHONEOS_DEPLOYMENT_TARGET: \"$SDK\"/" project.yml
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned IPA
        id: build_ipa
        run: bash Scripts/package_unsigned_ipa.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageStudio-iOS-unsigned
          path: build/ImageStudio-unsigned.ipa
